spring:
  application:
    name: secure-chat

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/securechat}
    username: ${DATABASE_USERNAME:securechat}
    password: ${DATABASE_PASSWORD:securechat}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Application-specific JWT settings
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongAndSecureSecretKeyForJwtSigningThatShouldBeChangedInProduction!}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRY_MS:900000}        # 15 minutes
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}   # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.securechat: INFO
    org.springframework.security: WARN
    org.springframework.web.socket: WARN
