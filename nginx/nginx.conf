worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Security headers
    add_header X-Frame-Options          DENY;
    add_header X-Content-Type-Options   nosniff;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          "strict-origin-when-cross-origin";

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # HTTP server (development / default)
    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;

        # Angular frontend
        location / {
            proxy_pass         http://frontend:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # REST API — rate limited
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend:8080/api/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend:8080/api/v1/auth/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # WebSocket (SockJS + STOMP)
        location /ws {
            proxy_pass         http://backend:8080/ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # ─── HTTPS (production) ─────────────────────────────────────────────
    # Uncomment the block below when you have SSL certificates.
    # Place your certs in nginx/ssl/ as fullchain.pem and privkey.pem,
    # then also uncomment the HTTP→HTTPS redirect server above.
    #
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
