version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: securechat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-securechat}
      POSTGRES_USER:     ${POSTGRES_USER:-securechat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securechat123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securechat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securechat-net

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./secure-chat-backend
      dockerfile: Dockerfile
    container_name: securechat-backend
    restart: unless-stopped
    environment:
      DATABASE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-securechat}
      DATABASE_USERNAME: ${POSTGRES_USER:-securechat}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-securechat123}
      JWT_SECRET:        ${JWT_SECRET:-ChangeThisInProductionWithAVeryLongRandomSecret!}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:80}
      WS_ALLOWED_ORIGINS:   ${WS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:80}
      SERVER_PORT:       8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - securechat-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Angular Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./secure-chat-frontend
      dockerfile: Dockerfile
    container_name: securechat-frontend
    restart: unless-stopped
    networks:
      - securechat-net

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: securechat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - securechat-net

volumes:
  postgres_data:

networks:
  securechat-net:
    driver: bridge

